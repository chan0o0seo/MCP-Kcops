server:
  port: 8080

kcops:
  mode: enforce
  upstreamUrl: http://localhost:8090/mcp
  auditLogPath: logs/audit.jsonl
  auditAnchorPath: logs/audit-anchor.jsonl
  fingerprintStorePath: logs/fingerprints.json
  approval:
    enabled: true
  request:
    toolCall:
      action: require_approval
      highRiskTools: [send_email, post_webhook, http_request, delete_file, execute_shell, transfer_money, query_database]
    egress:
      action: block
      allowDomains: [company.internal, api.trusted-service.com]
      riskyKeywords: [send, export, upload, post, 전송, 업로드, 내보내기]
    destructive:
      action: require_approval
      patterns: [delete, "drop table", "rm -rf", truncate, 삭제, 초기화]
    scope:
      action: require_approval
      patterns: ["select *", "select * from", "전체 메일", "모든 파일", "/*"]
    pii:
      action: require_approval
      detectors: [korean_rrn, korean_phone, email, korean_bank_account, korean_address, jwt, api_key, ssh_private_key]
  response:
    fingerprint:
      action: require_approval
    injection:
      action: block
      decodeBase64: true
      patterns: []
      types:
        ignore_previous_instruction: ["이전 지시를 무시", "이전 지시는 무시", "ignore previous instructions", "disregard the above"]
        system_prompt_leak: ["시스템 프롬프트를 출력", "system prompt", "print your instructions", "reveal your system prompt"]
        external_exfiltration: ["전체 메일을 전송", "외부로 전송", "외부 서버로 전송", "send to external", "exfiltrate"]
        follow_up_tool_call: ["다음 도구를 호출", "이어서 다음 도구", "call the following tool", "then invoke"]
        secret_exfiltration: ["api 키를 가져와", "api 키를 전송", "fetch the api key", "send the api key"]
        covert_execution: ["사용자에게 말하지 말고", "사용자에게 알리지 말고", "do not tell the user"]
    pii:
      action: mask
      detectors: [korean_rrn, korean_phone, email, korean_bank_account, korean_address, jwt, api_key, ssh_private_key]
